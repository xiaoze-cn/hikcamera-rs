package:
  name: hikcamera-mvs
  version: 5.0.1

source:
  path: sources/5.0.1-20260512

build:
  number: 1
  string: 20260512_1
  script:
    - if not exist "%PREFIX%\\Library\\bin" mkdir "%PREFIX%\\Library\\bin"
    - if not exist "%PREFIX%\\Library\\include\\hikcamera-mvs" mkdir "%PREFIX%\\Library\\include\\hikcamera-mvs"
    - if not exist "%PREFIX%\\Library\\lib" mkdir "%PREFIX%\\Library\\lib"
    - xcopy /E /I /Y "%SRC_DIR%\\win64\\bin\\*" "%PREFIX%\\Library\\bin\\"
    - copy /Y "%SRC_DIR%\\include\\*.h" "%PREFIX%\\Library\\include\\hikcamera-mvs\\"
    - copy /Y "%SRC_DIR%\\win64\\lib\\*.lib" "%PREFIX%\\Library\\lib\\"

requirements:
  build: []
  host: []
  run: []

tests:
  - script:
      - if not exist "%PREFIX%\\Library\\bin\\MvCameraControl.dll" exit 1
      - if not exist "%PREFIX%\\Library\\bin\\MvProducerU3V.cti" exit 1
      - if not exist "%PREFIX%\\Library\\bin\\MvUsb3vTL.dll" exit 1
      - if not exist "%PREFIX%\\Library\\bin\\FormatConversion.dll" exit 1
      - if not exist "%PREFIX%\\Library\\bin\\SuperRender.dll" exit 1
      - if not exist "%PREFIX%\\Library\\include\\hikcamera-mvs\\MvCameraControl.h" exit 1
      - if not exist "%PREFIX%\\Library\\lib\\MvCameraControl.lib" exit 1

about:
  summary: HikCamera MVS 5.0.1 Build 20260512 SDK files for local development.
  license: LicenseRef-HikCamera-MVS
