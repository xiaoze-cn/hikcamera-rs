package:
  name: hikcamera-mvs-runtime
  version: 0.1.0

source:
  path: .

build:
  number: 1
  script:
    - if not exist "%PREFIX%\\Library\\bin" mkdir "%PREFIX%\\Library\\bin"
    - copy /Y "%SRC_DIR%\\files\\win64\\*.dll" "%PREFIX%\\Library\\bin\\"
    - copy /Y "%SRC_DIR%\\files\\win64\\*.ini" "%PREFIX%\\Library\\bin\\"

requirements:
  build: []
  host: []
  run: []

tests:
  - script:
      - if not exist "%PREFIX%\\Library\\bin\\MvCameraControl.dll" exit 1

about:
  summary: Vendored HikCamera MVS runtime files for local hikcamera-rs development.
  license: LicenseRef-HikCamera-MVS
